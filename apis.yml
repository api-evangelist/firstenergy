description: >-
  FirstEnergy is one of the largest investor-owned electric systems in the
  United States, with utilities serving customers in Ohio, Pennsylvania, New
  Jersey, West Virginia, Maryland, and New York. FirstEnergy does not publish a
  public developer portal or open API catalog. Customer energy data is shared
  with authorized Curtailment Service Providers and Conservation Service
  Providers under its Third-Party Data Access program in Pennsylvania, and bulk
  utility data is exchanged with state regulators and grid operators through
  Electronic Data Interchange (EDI) and other industry-standard interfaces.
